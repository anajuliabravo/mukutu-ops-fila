<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mukutu Ops - Fila de Projetos</title>
  
  <!-- Tailwind CSS Via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#1a73e8', // Default blue from Google Material Design / Stitch Guidelines
            bgLight: '#f1f3f4'
          }
        }
      }
    }
  </script>
  
  <!-- SheetJS para ler e baixar planilhas/CSV no lado cliente nativamente -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script src="app.js" defer></script>
</head>
<body class="bg-bgLight text-gray-800 font-sans min-h-screen">
  
  <!-- Header App - Simplificado e Utilitário -->
  <header class="bg-white shadow-sm sticky top-0 z-10 px-6 py-4 flex justify-between items-center border-b border-gray-200">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-brand flex items-center justify-center text-white font-bold text-lg">M</div>
      <h1 class="text-xl font-medium tracking-tight whitespace-nowrap">Fila de Operações</h1>
    </div>
    <div class="flex gap-4">
      
      <label class="cursor-pointer bg-brand hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium text-sm transition-colors flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        <span>Importar Planilha</span>
        <!-- O accept restringe no File Explorer os formatos visiveis -->
        <input type="file" id="fileInput" accept=".xlsx, .csv" class="hidden" />
      </label>
      
      <!-- Baixar CSV seguro com Colunas Exatas -->
      <button id="btnDownloadTemplate" class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-md font-medium text-sm transition-colors flex items-center gap-2 hidden sm:flex">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Baixar Template 
      </button>

    </div>
  </header>

  <main class="max-w-[1400px] mx-auto px-4 py-6 sm:px-6 lg:px-8">
    <!-- Visual Loading State -->
    <div id="loader" class="hidden text-center py-10 transition-all">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand mx-auto mb-2"></div>
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Sincronizando Fila...</p>
    </div>

    <!-- UI: Lista Densa (Estilo Google Rows) -->
    <div id="queueContainer" class="flex flex-col gap-2">
      <div class="text-center py-20 bg-white rounded-lg shadow-sm border border-gray-200">
        <p class="text-gray-400">Puxando informações com a nuvem estruturada Vercel...</p>
      </div>
    </div>
  </main>
</body>
</html>
